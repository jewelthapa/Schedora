{% extends "base.html" %}
{% block title %}Log in · Schedora{% endblock %}

{% block content %}
<section class="auth">
  <div class="auth__card">
    <h1 class="auth__title">Welcome back</h1>
    <p class="auth__sub">Log in to manage your bookings.</p>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth__form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <label class="field">
        <span class="field__label">Email</span>
        <input type="email" name="email" value="{{ email or '' }}" required>
      </label>

      <label class="field">
        <span class="field__label">Password</span>
        <input type="password" name="password" required>
      </label>

      <button type="submit" class="btn btn--solid btn--lg auth__submit">Log in</button>
    </form>

    <p class="auth__alt">New to Schedora?
      <a href="{{ url_for('auth.register') }}">Create an account</a></p>
  </div>
</section>
{% endblock %}
