{% extends "base.html" %}

{% block content %}
<div class="dash-shell">

  <aside class="dash-side" aria-label="Dashboard navigation">
    <div class="dash-side__panel">

      <div class="dash-side__brand">
        <span class="dash-side__brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="17" rx="4"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
          </svg>
        </span>
        <span class="dash-side__brand-name">Schedora</span>
      </div>

      <nav class="dash-side__nav" aria-label="Main">
        {% if current_user.role == 'provider' %}
          <a class="dash-side__link {% if active == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard.dashboard') }}">
            <span class="dash-side__ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg></span>
            Dashboard
          </a>
          <a class="dash-side__link {% if active == 'services' %}active{% endif %}" href="#">
            <span class="dash-side__ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7h-9M14 17H5M17 17a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM7 10a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/></svg></span>
            My services
          </a>
          <a class="dash-side__link {% if active == 'slots' %}active{% endif %}" href="#">
            <span class="dash-side__ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
            Availability
          </a>
          <a class="dash-side__link {% if active == 'bookings' %}active{% endif %}" href="#">
            <span class="dash-side__ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></span>
            Bookings
          </a>
          <a class="dash-side__link {% if active == 'reviews' %}active{% endif %}" href="#">
            <span class="dash-side__ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
            Reviews
          </a>
        {% else %}
          <a class="dash-side__link {% if active == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard.dashboard') }}">
            <span class="dash-side__ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg></span>
            Dashboard
          </a>
          <a class="dash-side__link {% if active == 'browse' %}active{% endif %}" href="#">
            <span class="dash-side__ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            Browse
          </a>
          <a class="dash-side__link {% if active == 'bookings' %}active{% endif %}" href="#">
            <span class="dash-side__ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
            My bookings
          </a>
          <a class="dash-side__link {% if active == 'favorites' %}active{% endif %}" href="#">
            <span class="dash-side__ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
            Favourites
          </a>
        {% endif %}
      </nav>

      <a class="dash-side__logout" href="{{ url_for('auth.logout') }}">
        <span class="dash-side__ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
        Log out
      </a>

    </div>
  </aside>

  <main class="dash-main">
    {% block dash_content %}{% endblock %}
  </main>

</div>
{% endblock %}
