<header class="nav">
  <div class="nav__inner">
    <a class="brand" href="{{ url_for('home') }}">
      <span class="brand__mark" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="28" height="28">
          <rect x="3" y="6" width="26" height="23" rx="6" fill="none" stroke="currentColor" stroke-width="2.4"/>
          <line x1="3" y1="13" x2="29" y2="13" stroke="currentColor" stroke-width="2.4"/>
          <line x1="10" y1="3" x2="10" y2="8" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
          <line x1="22" y1="3" x2="22" y2="8" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M11 21.5l3.2 3.2L22 18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="brand__name">Schedora</span>
    </a>

    <div class="nav__actions">
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle theme"></button>
      {% if current_user %}
        <span class="nav__hello">Hi, {{ current_user.name }}</span>
        <a class="btn btn--ghost" href="{{ url_for('auth.logout') }}">Log out</a>
      {% else %}
        <a class="btn btn--ghost" href="{{ url_for('auth.login') }}">Log in</a>
        <a class="btn btn--solid" href="{{ url_for('auth.register') }}">Get started</a>
      {% endif %}
    </div>
  </div>
</header>
