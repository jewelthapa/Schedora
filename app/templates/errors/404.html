{% extends "base.html" %}
{% block title %}Page not found · Schedora{% endblock %}
{% block content %}
<section class="err">
  <div class="err__code">404</div>
  <h1 class="err__title">Page not found</h1>
  <p class="err__text">The page you're looking for doesn't exist or may have moved.</p>
  <div class="err__actions">
    <a class="btn btn--solid" href="{{ url_for('home') }}">Back to home</a>
    <a class="btn btn--ghost" href="{{ url_for('browse.browse') }}">Browse services</a>
  </div>
</section>
{% endblock %}
